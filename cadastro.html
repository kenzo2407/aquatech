</div>

  <div>
    
    <div class="container" style="background-image: url('https://cobasiblog.blob.core.windows.net/production-ofc/2021/08/agua-viva-capa.png'); background-size:cover ; background-position: center; height: 100vh;">
       <div style="background:#ddd; width:350px; margin:auto; padding:30px; border-radius:10px; text-align: center;">
      <div class="card card-cadastro">
        <h2 style="color: #e91e63;">Bem-vindo!</h2> 
        <div class="formulario">
          <div class="campo">
            <span style="color: #e91e63;">Código de ativação: <br></span>
            <input id="codigo_input" type="text" placeholder="Insira aqui seu código" style="border: 2px solid #2ec4c7; width: 100%;"/>
          </div>
          <div class="campo">
            <span style="color: #e91e63;">Nome: <br></span>
            <input id="nome_input" type="text" placeholder="Seu nome" style="border: 2px solid #2ec4c7; width: 100%;"/>
          </div>
          <div class="campo">
            <span style="color: #e91e63;">E-mail: <br></span>
            <input id="email_input" type="text" placeholder="meuemail@provedor.com" style="border:2px solid #2ec4c7; width: 100%;" />
          </div>
          <div class="campo">
            <span style="color: #e91e63;">Senha: <br></span>
            <input id="senha_input" type="password" placeholder="******" style="border:2px solid #2ec4c7; width: 100%;" />
          </div>
          <div class="campo">
            <span style="color: #e91e63;">Confirmação da Senha: <br></span>
            <input id="confirmacao_senha_input" type="password" placeholder="******" style="border:2px solid #2ec4c7; width: 100%;"/> 
          </div>
          <button class ="botao" style="background:#e91e63; color: white;">Cadastrar</button>
        </div>
      </div>
    </div>
    </div>
  </div>
